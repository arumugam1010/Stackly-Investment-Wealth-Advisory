<body class="page-404">
  </div>
  

  <div class="err-page">
    <div class="hero-bg" style="background-image:url('assets/bg-hero.webp');opacity:.28;"></div>
    <div class="hero-grid-bg"></div>
    <div class="hero-orb a"></div><div class="hero-orb b"></div><div class="hero-orb c"></div>

    <div class="position-relative text-center" style="z-index:2;">
      <div class="err-404">404</div>
      <h2 class="mt-2" style="font-size:1.6rem;">This page wandered off the chart.</h2>
      <p class="text-muted-2 mt-2 mx-auto" style="max-width:540px;">The page you're looking for couldn't be found. Let's get you back on course.</p>

      <div class="d-flex flex-wrap gap-3 justify-content-center mt-4">
        <a href="index.html" class="btn btn-grad"><i class="bi bi-house-door"></i> Return to Home</a>
        <button type="button" class="btn btn-ghost" id="btnDash" onclick="goToDashboard();"><i class="bi bi-speedometer2"></i> Return to Dashboard</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var username = localStorage.getItem("username");
      if (!username) {
        var btn = document.getElementById("btnDash");
        if (btn) btn.style.display = "none";
      }
    });

    function goToDashboard() {
      var role = localStorage.getItem("role") || "client";
      var cleanRole = role.toLowerCase().trim();
      if (cleanRole.includes("advisor") || cleanRole.includes("financial")) {
        window.location.href = "pages/advisor-dashboard.html";
      } else if (cleanRole.includes("admin")) {
        window.location.href = "pages/admin-dashboard.html";
      } else {
        window.location.href = "pages/client-dashboard.html";
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
